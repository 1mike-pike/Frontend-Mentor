<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>Zadanie PSI</title>
</head>
<body>
    <main>
        <div id="card-container" class="card-container">
            <picture class="image-container">
                <source srcset="./assets/images/image-product-desktop.jpg" media="(min-width: 768px)" />
                <img src="./assets/images/image-product-mobile.jpg" alt="product image"/>
            </picture>
            <section class="text-container">
                <p class="type">Perfume</p>
                <h1 class="title">Gabrielle Essence Eau De Parfum</h1>
                <p class="desc">
                    A floral, solar and voluptuous interpretation composed by Olivier Polge, 
                    Perfumer-Creator for the House of CHANEL.
                </p>
                <div class="price-section">
                    <span class="current-price">&dollar;149.99</span>
                    <span class="initial-price">&dollar;169.99</span>
                </div>
                <button class="add-to-cart-button">
                    <img src="./assets/icons/icon-cart.svg"/>
                    <span>
                        Add to Cart
                    </span>
                </button>
            </section>
        </div>
    </main>
</body>
</html>
